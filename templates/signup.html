<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<body class="bg-blue-50/50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        <div class="md:w-1/3 bg-blue-600 p-8 text-white flex flex-col justify-between">
            <div>
                <a href="{{ url_for('home') }}" class="flex items-center gap-2 mb-4 hover:opacity-80 transition">
                    <div class="bg-white text-blue-600 p-2 rounded-lg">
                        <i class="fas fa-graduation-cap text-xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold">A+ <span class="text-blue-200">Finder</span></h2>
                </a>
                <p class="mt-4 text-blue-100 text-sm leading-relaxed">
                    회원가입 시 본인의 학번(2026XXXX)이 자동으로 부여됩니다.
                </p>
            </div>
            <div class="text-xs text-blue-200 italic">© 2026 Deamon Software</div>
        </div>

        <div class="md:w-2/3 p-8">
            <h3 class="text-2xl font-bold text-gray-800">새 계정 만들기</h3>
            <p class="text-gray-500 text-sm mb-6">정보를 입력하여 성적 조회를 시작하세요.</p>
            
            <form action="{{ url_for('signup') }}" method="POST" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">아이디</label>
                        <input type="text" name="login_id" required class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">성함</label>
                        <input type="text" name="name" required class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50">
                    </div>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">비밀번호</label>
                    <input type="password" name="password" required class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">연락처</label>
                        <input type="text" name="phone" placeholder="010-0000-0000" class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">이메일</label>
                        <input type="email" name="email" placeholder="example@mail.com" class="w-full mt-1 px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-50">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition">계정 생성 및 학번 발급</button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <span class="text-sm text-gray-400">이미 계정이 있으신가요?</span>
                <a href="{{ url_for('login') }}" class="text-sm text-blue-600 font-bold hover:underline ml-1">로그인하기</a>
            </div>
        </div>
    </div>
</body>
