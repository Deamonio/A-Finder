<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | A+ Finder</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; }
        .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .card { width: 100%; max-width: 360px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
        h1 { margin: 0 0 16px; font-size: 22px; }
        label { display: block; font-size: 14px; margin-bottom: 6px; }
        input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 12px; }
        button { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; }
        .links { margin-top: 14px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>로그인</h1>
            <form action="/login" method="POST">
                <label for="login_id">아이디</label>
                <input id="login_id" type="text" name="login_id" required>

                <label for="password">비밀번호</label>
                <input id="password" type="password" name="password" required>

                <button type="submit">로그인</button>
            </form>
            <div class="links">
                <a href="{{ url_for('signup') }}">회원가입</a> | <a href="{{ url_for('home') }}">홈</a>
            </div>
        </div>
    </div>
</body>
</html>
