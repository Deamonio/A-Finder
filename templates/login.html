<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="w-full max-w-md bg-white shadow-lg rounded-lg p-8">
        <div class="text-center mb-10">
            <a href="/afinder" class="flex items-center justify-center gap-2 mb-4 hover:opacity-80 transition">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <span class="text-2xl font-black text-gray-800 tracking-tight">A+ <span class="text-blue-600">Finder</span></span>
            </a>
            <p class="text-gray-500 mt-2">성적 조회 시스템에 로그인하세요</p>
        </div>
        <form action="/afinder/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">아이디</label>
                <input type="text" name="login_id" required class="w-full px-4 py-3 mt-1 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">비밀번호</label>
                <input type="password" name="password" required class="w-full px-4 py-3 mt-1 border rounded-md focus:ring-2 focus:ring-blue-400 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-md transition duration-300">로그인</button>
        </form>
        <div class="mt-6 text-center text-sm text-gray-500">
            계정이 없으신가요? <a href="/afinder/signup" class="text-blue-600 hover:underline">회원가입</a>
        </div>
    </div>
</body>
