# ============================================
# 메인 도메인 서버 블록 (deamon.io 인증서 사용)
# ============================================
server {
    listen 443 ssl http2;
    server_name deamon.io mesh.deamon.io;

    # deamon.io 인증서
    ssl_certificate /etc/letsencrypt/live/deamon.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deamon.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Next.js 프론트엔드
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI 백엔드
    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ============================================
# afinder 서브도메인 (afinder.deamon.io 인증서 사용)
# ============================================
server {
    listen 443 ssl http2;
    server_name afinder.deamon.io;

    # afinder.deamon.io 인증서
    ssl_certificate /etc/letsencrypt/live/afinder.deamon.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/afinder.deamon.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 로그 설정
    access_log /var/log/nginx/afinder_access.log;
    error_log /var/log/nginx/afinder_error.log;

    # Flask 애플리케이션
    location / {
        proxy_pass http://localhost:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # 웹소켓 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 타임아웃
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 정적 파일 캐싱
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ============================================
# HTTP → HTTPS 리다이렉트
# ============================================
server {
    listen 80;
    server_name deamon.io mesh.deamon.io afinder.deamon.io;
    return 301 https://$host$request_uri;
}
