server {
    listen 80;
    server_name class.afinder.deamon.io;

    # SSL 설정 (Let's Encrypt 등 SSL 인증서 사용 시)
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/class.afinder.deamon.io/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/class.afinder.deamon.io/privkey.pem;

    access_log /var/log/nginx/afinder-class-access.log;
    error_log /var/log/nginx/afinder-class-error.log;

    # 최대 업로드 파일 크기
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 정적 파일 캐싱
    location /static {
        alias /home/ubuntu/afinder-class/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
